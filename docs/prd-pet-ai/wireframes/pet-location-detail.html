<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>场所详情 - 宠物AI一体化 App 原型</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; color: #333; background: #fff; max-width: 375px; margin: 0 auto; border: 1px solid #d0d0d0; min-height: 100vh; }
    .header { background: #f5f5f5; padding: 12px 24px; border-bottom: 1px solid #d0d0d0; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header a { font-size: 12px; color: #4a90d9; text-decoration: none; }
    .content { padding: 16px 24px 90px; }
    .hero { background: #e0e0e0; height: 180px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #888; font-size: 14px; margin-bottom: 12px; }
    .section { background: #f5f5f5; border: 1px solid #d0d0d0; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    .title-row { display: flex; justify-content: space-between; gap: 8px; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .tag { font-size: 11px; padding: 4px 8px; border-radius: 12px; background: #e0e0e0; }
    .alert { background: #fff3cd; border: 1px solid #f0d58a; color: #7a5d00; border-radius: 8px; padding: 10px 12px; font-size: 12px; margin-top: 10px; }
    .muted { font-size: 12px; color: #888; }
    .rule-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #e8e8e8; font-size: 13px; }
    .rule-item:last-child { border-bottom: none; }
    .btn-row { display: flex; gap: 10px; margin-top: 12px; }
    .btn-primary, .btn-secondary { flex: 1; text-align: center; text-decoration: none; padding: 10px; border-radius: 8px; font-size: 14px; }
    .btn-primary { background: #555; color: #fff; }
    .btn-secondary { background: #fff; color: #555; border: 1px solid #aaa; }
    .comment { padding: 10px 0; border-bottom: 1px solid #e8e8e8; }
    .comment:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>场所详情</h1>
    <a href="pet-location-map.html">返回</a>
  </div>
  <div class="content">
    <div class="hero">场所封面 / 地图快照占位</div>

    <div class="section">
      <div class="title-row">
        <div>
          <div style="font-size:18px; font-weight:700;">爪爪咖啡实验室</div>
          <div class="muted" style="margin-top:4px;">上海市静安区 ×× 路 88 号 · 4.8 分 · 今日 09:00-22:00</div>
        </div>
        <div class="muted">距你 520m</div>
      </div>
      <div class="tags">
        <span class="tag">室内可进</span>
        <span class="tag">需航空箱/怀抱</span>
        <span class="tag">提供饮水</span>
        <span class="tag">店员友好</span>
      </div>
      <div class="alert">根据当前宠物“奶茶（猫咪）”档案判断：适配度较高。注意高峰时段建议避开周末下午。</div>
      <div class="btn-row">
        <a class="btn-primary" href="pet-location-checkin.html">去打卡</a>
        <a class="btn-secondary" href="pet-location-map.html">导航前往</a>
      </div>
    </div>

    <div class="section">
      <div style="font-size:14px; font-weight:600; margin-bottom:6px;">入宠规则</div>
      <div class="rule-item"><span>是否允许携宠进入</span><strong>允许</strong></div>
      <div class="rule-item"><span>是否限制体型</span><strong>大型犬需预约</strong></div>
      <div class="rule-item"><span>是否需牵引/航空箱</span><strong>是</strong></div>
      <div class="rule-item"><span>是否需疫苗证明</span><strong>建议携带</strong></div>
    </div>

    <div class="section">
      <div style="font-size:14px; font-weight:600; margin-bottom:6px;">近期评价</div>
      <div class="comment">
        <div style="font-size:13px; font-weight:600;">@Momo妈</div>
        <div class="muted" style="margin-top:4px;">猫咪友好，店员会主动问是否需要安静角落。</div>
      </div>
      <div class="comment">
        <div style="font-size:13px; font-weight:600;">@豆豆爸</div>
        <div class="muted" style="margin-top:4px;">周末人偏多，小型犬没问题，大型犬建议提前电话确认。</div>
      </div>
    </div>
  </div>
</body>
</html>
