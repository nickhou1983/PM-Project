<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>筛选与列表 - 宠物AI一体化 App 原型</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; color: #333; background: #fff; max-width: 375px; margin: 0 auto; border: 1px solid #d0d0d0; min-height: 100vh; }
    .header { background: #f5f5f5; padding: 12px 24px; border-bottom: 1px solid #d0d0d0; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header a { font-size: 12px; color: #4a90d9; text-decoration: none; }
    .content { padding: 16px 24px 80px; }
    .section { background: #f5f5f5; border: 1px solid #d0d0d0; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    .title { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { padding: 6px 10px; font-size: 12px; border-radius: 16px; border: 1px solid #d0d0d0; background: #fff; }
    .chip.active { background: #555; color: #fff; border-color: #555; }
    .card { background: #f5f5f5; border: 1px solid #d0d0d0; border-radius: 10px; padding: 14px; margin-bottom: 10px; text-decoration: none; color: #333; display: block; }
    .muted { font-size: 12px; color: #888; }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .btn-primary { display: block; width: 100%; text-align: center; text-decoration: none; background: #555; color: #fff; padding: 12px; border-radius: 8px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>筛选与列表</h1>
    <a href="pet-location-map.html">返回地图</a>
  </div>
  <div class="content">
    <div class="section">
      <div class="title">适配当前宠物：奶茶（猫咪）</div>
      <div class="chips">
        <span class="chip active">猫咪友好</span>
        <span class="chip">小型犬友好</span>
        <span class="chip">大型犬友好</span>
        <span class="chip active">室内可进</span>
      </div>
    </div>

    <div class="section">
      <div class="title">场景与设施</div>
      <div class="chips">
        <span class="chip active">咖啡馆</span>
        <span class="chip">公园</span>
        <span class="chip">商场</span>
        <span class="chip">酒店</span>
        <span class="chip active">提供饮水</span>
        <span class="chip">宠物推车可进</span>
        <span class="chip">有停车</span>
      </div>
      <a class="btn-primary" href="pet-location-map.html">应用筛选（共 8 个结果）</a>
    </div>

    <div class="row" style="margin-bottom:10px;">
      <strong style="font-size:14px;">结果列表（8）</strong>
      <span class="muted">按距离排序</span>
    </div>

    <a class="card" href="pet-location-detail.html">
      <div class="row">
        <strong style="font-size:15px;">爪爪咖啡实验室</strong>
        <span class="muted">520m</span>
      </div>
      <div class="muted" style="margin-top:6px;">室内可进 · 需航空箱或抱着进入 · 用户评分 4.8</div>
    </a>

    <a class="card" href="pet-location-detail.html">
      <div class="row">
        <strong style="font-size:15px;">猫步书房</strong>
        <span class="muted">860m</span>
      </div>
      <div class="muted" style="margin-top:6px;">安静空间 · 猫咪更适配 · 需提前预约</div>
    </a>

    <div class="section">
      <div class="title">空状态兜底</div>
      <div class="muted">若筛选后无结果，系统显示“清空筛选”按钮，并推荐热门商圈或允许用户切换城市。</div>
    </div>
  </div>
</body>
</html>
